# тЦДтЦДтЦДтЦД┬╖ тЦк   тЦР тЦД ┬╖тЦДтЦДтЦДтЦД  .тЦДтЦД ┬╖ 
# тЦРтЦИ тЦАтЦИтЦктЦИтЦИ тАвтЦИтЦМтЦРтЦИтЦИтЦИтЦк тЦИтЦИ тЦРтЦИ тЦА. 
# тЦРтЦИтЦАтЦАтЦИтЦДтЦРтЦИ┬╖тЦРтЦИтЦРтЦРтЦМтЦРтЦИ┬╖ тЦРтЦИтЦМтЦДтЦАтЦАтЦАтЦИтЦД
# тЦИтЦИтЦДтЦктЦРтЦИтЦРтЦИтЦМтЦИтЦИтЦРтЦИтЦМтЦИтЦИ. тЦИтЦИ тЦРтЦИтЦДтЦктЦРтЦИ
# ┬╖тЦАтЦАтЦАтЦА тЦАтЦАтЦАтЦАтЦА тЦИтЦктЦАтЦАтЦАтЦАтЦАтАв  тЦАтЦАтЦАтЦА 

# https://wiki.hyprland.org/Configuring/Binds/

$TOGGLE_ROFI = $SCRIPTS/toggle_rofi 
$ROFI_MENUS = ~/.config/rofi/bin

$TERMINAL = Ghostty
$BROWSER = firefox
$FILE_MANAGER = thunar
$CODE = vscodium

# ==--==--==--==--==--==--==--==--==--==--==--== #

# Terminal
bind = SUPER Return, exec, $TERMINAL 
bind = SUPER SHIFT, Return, exec, [float] $TERMINAL 

bind = SUPER,       tab, workspace, m+1
bind = SUPER SHIFT, tab, workspace, m-1

bind = SUPER,       Q, killactive,
bind = SUPER SHIFT, Q, forcekillactive,

# Launch some apps
bind = SUPER, B, exec, $FILE_MANAGER
bind = SUPER, N, exec, $BROWSER
bind = SUPER, M, exec, $CODE

bind = SUPER, W, centerwindow # Works only for floating window
bind = SUPER, U, pin
bind = SUPER, P, pseudo
bind = SUPER, Z, resizeactive, -25% -20%
bind = SUPER, C, resizeactive, 25% 20%

bind = SUPER,       F, exec, hyprctl --batch "dispatch togglefloating ; dispatch centerwindow 1"
bind = SUPER SHIFT, F, fullscreen

# dwindle only
bind = SUPER, A, layoutmsg, swapsplit
bind = SUPER, D, layoutmsg, togglesplit
bind = SUPER, W, layoutmsg, movetoroot active

# scrolling only 
bind = SUPER,       A, layoutmsg, swapcol l
bind = SUPER,       D, layoutmsg, swapcol r
bind = SUPER,       W, layoutmsg, colresize +conf
bind = SUPER SHIFT, W, layoutmsg, colresize -conf

# master / monocle  only
bind = SUPER, A, layoutmsg, cycleprev
bind = SUPER, D, layoutmsg, cyclenext

# Minimize window
bind = SUPER, X, togglespecialworkspace, minimize
bind = SUPER, X, movetoworkspace, +0
bind = SUPER, X, togglespecialworkspace, minimize
bind = SUPER, X, movetoworkspace, special:minimize
bind = SUPER, X, togglespecialworkspace, minimize

# Groups
bind = SUPER, O, togglegroup
bind = SUPER, bracketleft,  changegroupactive, b
bind = SUPER, bracketright, changegroupactive, f

# Cycle layout for the workspace
bind = SUPER,       I, exec, $SCRIPTS/cycle_layout
bind = SUPER SHIFT, I, exec, $SCRIPTS/cycle_layout --prev

# Reload config
bind = SUPER CTRL, R, exec, hyprctl reload

# Sway notifications center
bind = SUPER, T, exec, swaync-client -t

# A bunch of rofi menus
bind = SUPER,       R, exec, $TOGGLE_ROFI $ROFI_MENUS/drun
bind = SUPER SHIFT, R, exec, $TOGGLE_ROFI $ROFI_MENUS/run
bind = SUPER,       V, exec, $TOGGLE_ROFI $ROFI_MENUS/clipboard
bind = SUPER SHIFT, V, exec, $TOGGLE_ROFI $ROFI_MENUS/icons
bind = SUPER,       E, exec, $TOGGLE_ROFI $ROFI_MENUS/filebrowser
bind = SUPER SHIFT, E, exec, $TOGGLE_ROFI $SCRIPTS/bookmarks
bind = SUPER,       Y, exec, $TOGGLE_ROFI python3 $SCRIPTS/auto_walls/rofi_selector.py
bind = SUPER,ESCAPE,   exec, $TOGGLE_ROFI $ROFI_MENUS/logout

# Switch between light/dark theme
bind = SUPER SHIFT, Y, exec, $SCRIPTS/themesw

# Change volume / gaps-in / gaps-out
binde = SUPER,       MINUS, exec, $SCRIPTS/volume -2
binde = SUPER,       EQUAL, exec, $SCRIPTS/volume +2
binde = SUPER SHIFT, MINUS, exec, $SCRIPTS/resize_gaps in -2
binde = SUPER CTRL,  MINUS, exec, $SCRIPTS/resize_gaps out -2
binde = SUPER SHIFT, EQUAL, exec, $SCRIPTS/resize_gaps in 2
binde = SUPER CTRL , EQUAL, exec, $SCRIPTS/resize_gaps out 2

# Waybar
bind = SUPER  SHIFT, SPACE, exec, $SCRIPTS/restart_waybar        # restart waybar
bind = SUPER  CTRL,  SPACE, exec, $SCRIPTS/change_waybar_layout  # switch waybar layout

# Optional: hide/show nwg dock or vicinae or waybar
bind = SUPER, SPACE, exec, pkill -SIGRTMIN+1 -f nwg-dock-hyprland
# bind = SUPER, SPACE, exec, killall -SIGUSR1 waybar
# bind = SUPER, SPACE, exec, vicinae toggle

bind = SUPER,       period, exec, playerctl next       # next track with SUPER + > 
bind = SUPER,       comma,  exec, playerctl previous   # prev track with SUPER + <
bind = SUPER,       slash,  exec, playerctl play-pause # play / pause on SUPER + slash
bind = SUPER SHIFT, slash,  exec, python3 $SCRIPTS/auto_walls/toggle_timer.py

# Next / Prev wallpaper
bind = SUPER SHIFT, period, exec, python3 $SCRIPTS/auto_walls/set_next.py
bind = SUPER SHIFT, comma, exec,  python3 $SCRIPTS/auto_walls/set_prev.py

# Screenshot / video_recording
bind =           , Print, exec, $SCRIPTS/screenshot 
bind =      SHIFT, Print, exec, $SCRIPTS/screenshot --select
bind = CTRL      , Print, exec, $SCRIPTS/toggle_recording
bind = CTRL SHIFT, Print, exec, $SCRIPTS/toggle_recording --select 

# Move focus win + arrow keys
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

# Move windows
bind = SUPER CTRL, left,  movewindow, l  
bind = SUPER CTRL, right, movewindow, r  
bind = SUPER CTRL, up,    movewindow, u  
bind = SUPER CTRL, down,  movewindow, d  

# Swap window 
bind = SUPER SHIFT, left,   swapwindow, l
bind = SUPER SHIFT, right,  swapwindow, r
bind = SUPER SHIFT, up,     swapwindow, u
bind = SUPER SHIFT, down,   swapwindow, d 

# Resize window
bind = SUPER CTRL SHIFT, left,  resizeactive, -70 0
bind = SUPER CTRL SHIFT, right, resizeactive,  70 0
bind = SUPER CTRL SHIFT, up,    resizeactive,  0 -70
bind = SUPER CTRL SHIFT, down,  resizeactive,  0 70

# Workspaces [1-5] 
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

# Moving windows to workspace [1-5]
bind = SUPER SHIFT, 1, movetoworkspacesilent, 1
bind = SUPER SHIFT, 2, movetoworkspacesilent, 2
bind = SUPER SHIFT, 3, movetoworkspacesilent, 3
bind = SUPER SHIFT, 4, movetoworkspacesilent, 4
bind = SUPER SHIFT, 5, movetoworkspacesilent, 5

# Moving windows to workspace and move to workspace [1-5]
bind = SUPER CTRL, 1, movetoworkspace, 1
bind = SUPER CTRL, 2, movetoworkspace, 2
bind = SUPER CTRL, 3, movetoworkspace, 3
bind = SUPER CTRL, 4, movetoworkspace, 4
bind = SUPER CTRL, 5, movetoworkspace, 5

# Tag window
bind = SUPER, 0, tagwindow, bordered
bind = SUPER, 9, tagwindow, opaque

# Special workspace
bind = SUPER,            S, togglespecialworkspace, magic
bind = SUPER SHIFT,      S, movetoworkspacesilent,  special:magic
bind = SUPER SHIFT CTRL, S, movetoworkspace,        special:magic 

bind = SUPER, mouse_up, workspace, e+1
bind = SUPER, mouse_down, workspace, e-1

# Misc binds
bindel = ,XF86AudioLowerVolume, exec, $SCRIPTS/volume  -5
bindel = ,XF86AudioRaiseVolume, exec, $SCRIPTS/volume  +5

bindl  = ,XF86AudioNext,        exec, playerctl next
bindl  = ,XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl  = ,XF86AudioPlayPause,   exec, playerctl play-pause
bindl  = ,XF86AudioPlay,        exec, playerctl play-pause
bindl  = ,XF86AudioPause,       exec, playerctl pause
bindl  = ,XF86MonBrightnessUp,  exec, $SCRIPTS/brightness 5%+ 
bindl  = ,XF86MonBrightnessDown,exec, $SCRIPTS/brightness 5%-
bindl  = ,XF86KbdBrightnessDown,exec, asusctl -p
bindl  = ,XF86KbdBrightnessUp,  exec, asusctl -n
bindl  = ,Pause,                exec, playerctl pause

bind  = ,XF86AudioMicMute,     exec, $SCRIPTS/toggle_microphone
bind  = ,XF86AudioPrev,        exec, playerctl previous
bind  = ,XF86Calculator,       exec, qalculate-gtk
bind  = ,XF86Launch1,          exec, $SCRIPTS/cycle_profile
bind  = ,XF86Launch4,          exec, rog-control-center 

# Mouse binds
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
