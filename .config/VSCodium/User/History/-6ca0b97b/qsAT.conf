exec-once = discord
exec-once = awww-daemon
exec-once = waybar
exec-once = hyprctl setcursor Capitaine Cursors 24
exec-once = gsettings set org.gnome.desktop.interface cursor-theme Capitaine Cursors
exec-once = gammastep-indicator
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/xfce-polkit/xfce-polkit
exec-once = hypridle
exec-once = swaync


# Optional features: Dock, Vicinae
# exec-once = nwg-dock-hyprland -p left -d -w 6 -nolauncher -ml 5 -l top -hl bottom
# exec-once = vicinae server

# Clipboard
exec-once = wl-paste --type text --watch cliphist -max-items=35 store
exec-once = wl-paste --type image --watch cliphist -max-items=10 store
exec-once = wl-clip-persist --clipboard regular


# Run all startup startup scripts
exec-once = ~/.local/bin/at_startup
